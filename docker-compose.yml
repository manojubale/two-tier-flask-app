version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  flask-app:
    build: .
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: test_db
    depends_on:
      - db
    command: >
      sh -c "
      echo 'Waiting for MySQL...' &&
      sleep 15 &&
      python app.py
      "
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
